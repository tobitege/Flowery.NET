name: CodeQL

on:
  push:
    branches:
      - main
      - alpha
      - avalonia12
  pull_request:
    branches:
      - main
      - alpha
      - avalonia12
  schedule:
    - cron: '32 3 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze C#
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          dependency-caching: true

      - name: Build library for CodeQL extraction
        run: dotnet build Flowery.NET/Flowery.NET.csproj -c Release

      - name: Build tests for CodeQL extraction
        run: dotnet build Flowery.NET.Tests/Flowery.NET.Tests.csproj -c Release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
